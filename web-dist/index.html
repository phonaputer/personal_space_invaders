<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <style type="text/css">
      * {
        margin: 0;
        padding: 0;
        background-color: black;
      }
      canvas {
        border: 0px none;
        outline: none;
        background-color: black;
        width: 100%;
        height: 100%;
        display: block;
        margin-left: auto;
        margin-right: auto;
      }
      .overlay-container {
        position: absolute;
        top: 0;
        left: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
      }
      .overlay {
        z-index: 1;
        font-size: 30px;
        color: white;
        background-color: black;
      }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div class="overlay-container" id="overlay-div">
      <span class="overlay" id="overlay-text">Loading...</span>
    </div>
    <script type="text/javascript">
      var Module = {};
      fetch("personal_space_invaders.wasm")
        .then((response) => response.arrayBuffer())
        .then((buffer) => {
          Module.canvas = document.getElementById("canvas");
          Module.wasmBinary = buffer;

          var script = document.createElement("script");
          script.src = "personal_space_invaders.js";
          script.onload = function () {
            console.log("Emscripten boilerplate loaded.");
          };
          document.body.appendChild(script);

          Module.canvas.onclick = function () {
            Module.canvas.focus();
          };

          document.getElementById("overlay-div").remove();
        });
    </script>
    <canvas id="canvas" tabindex="0"></canvas>
  </body>
</html>
